    <!-- A -->
    <path d="M68.5 0L93 42.5H81L77 31H60L56 42.5H44L68.5 0Z M62.5 24H74.5L68.5 8.5L62.5 24Z"
          fill="url(#brandGrad)" fill-rule="evenodd"/>

    <!-- I -->
    <path d="M99 0H111V42.5H99V0Z" fill="url(#brandGrad)"/>
    <rect x="99" y="0" width="12" height="2.5" rx="1.25" fill="url(#lightGrad)"/>
