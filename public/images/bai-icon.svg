<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 104 104" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <path d="M52 4L96 28V76L52 100L8 76V28L52 4Z" fill="url(#g)" opacity="0.12"/>
  <path d="M52 4L96 28V76L52 100L8 76V28L52 4Z" stroke="url(#g)" stroke-width="2.5" fill="none"/>

  <!-- Inner diamond -->
  <path d="M52 22L78 42V62L52 82L26 62V42L52 22Z" fill="url(#g)" opacity="0.25"/>

  <!-- Pulse arcs -->
  <g stroke="url(#gl)" stroke-width="2.2" stroke-linecap="round" fill="none" filter="url(#glow)">
    <path d="M34 52C38 42 46 36 52 36"/>
    <path d="M70 52C66 42 58 36 52 36"/>
    <path d="M34 52C38 62 46 68 52 68"/>
    <path d="M70 52C66 62 58 68 52 68"/>
  </g>

  <!-- Center core -->
  <circle cx="52" cy="52" r="5" fill="url(#g)"/>
  <circle cx="52" cy="52" r="2.5" fill="white" opacity="0.9"/>

  <!-- Nodes -->
  <circle cx="52" cy="22" r="3" fill="url(#g)"/>
  <circle cx="78" cy="42" r="3" fill="url(#g)"/>
  <circle cx="78" cy="62" r="3" fill="url(#g)"/>
  <circle cx="52" cy="82" r="3" fill="url(#g)"/>
  <circle cx="26" cy="62" r="3" fill="url(#g)"/>
  <circle cx="26" cy="42" r="3" fill="url(#g)"/>

  <!-- Connecting spokes -->
  <g stroke="url(#g)" stroke-width="1" opacity="0.35">
    <line x1="52" y1="52" x2="52" y2="22"/>
    <line x1="52" y1="52" x2="78" y2="42"/>
    <line x1="52" y1="52" x2="78" y2="62"/>
    <line x1="52" y1="52" x2="52" y2="82"/>
    <line x1="52" y1="52" x2="26" y2="62"/>
    <line x1="52" y1="52" x2="26" y2="42"/>
  </g>
</svg>
